services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: spring_boot_tutorial
      POSTGRES_USER: spring_boot_tutorial
      POSTGRES_PASSWORD: spring_boot_tutorial
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spring_boot_tutorial"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/spring_boot_tutorial
      DB_USERNAME: spring_boot_tutorial
      DB_PASSWORD: spring_boot_tutorial
    ports:
      - "8080:8080"

volumes:
  db-data:
