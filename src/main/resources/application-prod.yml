spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: INFO
  file:
    name: logs/app.log
  structured:
    format:
      console: ecs
      file: ecs
